<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: 'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background: #F0F5FA; color: #1A2433; }

/* ヘッダー */
.header { background: #1A5F7A; padding: 14px 20px; padding-top: calc(14px + env(safe-area-inset-top)); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-title { color: #fff; font-weight: 800; font-size: 18px; }
.header-sub { color: rgba(255,255,255,0.65); font-size: 12px; }

/* 進捗ドット */
.progress { display: flex; align-items: center; gap: 6px; }
.dot-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 2px 6px; }
.dot { width: 12px; height: 12px; border-radius: 50%; transition: all 0.2s; }
.dot-label { font-size: 10px; color: rgba(255,255,255,0.7); }
.dot-label.active { color: #fff; font-weight: 700; }

/* コンテンツ */
.content { max-width: 800px; margin: 0 auto; padding: 20px 16px 100px; }

/* カード */
.card { background: #fff; border-radius: 14px; border: 1px solid #D4DDE8; padding: 20px; margin-bottom: 16px; }

/* セクションタイトル */
.section-title { font-size: 22px; font-weight: 800; color: #1A5F7A; text-align: center; margin-bottom: 6px; }
.section-sub { font-size: 14px; color: #6B7A8D; text-align: center; margin-bottom: 20px; }

/* ページドット */
.page-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 18px; }
.page-dot { width: 10px; height: 10px; border-radius: 50%; background: #D4DDE8; }
.page-dot.active { background: #1A5F7A; }

/* ラベル */
.field-label { font-size: 14px; color: #6B7A8D; font-weight: 600; display: block; margin-bottom: 6px; }

/* 入力 */
input[type=text], input[type=number], input[type=time], input[type=date] {
  width: 100%; padding: 13px 14px; font-size: 17px; border: 2px solid #D4DDE8; border-radius: 12px; outline: none; font-family: inherit;
}
input:focus { border-color: #1A5F7A; }

/* グリッド */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }

/* タッチラジオ */
.touch-radio { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 52px; padding: 8px 6px; background: #fff; color: #1A2433; border: 2px solid #D4DDE8; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 400; text-align: center; line-height: 1.3; transition: all 0.12s; user-select: none; }
.touch-radio.selected { background: #1A5F7A; color: #fff; border-color: #1A5F7A; font-weight: 700; }
.touch-radio.yes-sel { background: #1A5F7A; color: #fff; border-color: #1A5F7A; font-weight: 700; }
.touch-radio.no-sel { background: #555; color: #fff; border-color: #555; font-weight: 700; }

/* 問タイトル */
.q-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.q-block { margin-bottom: 18px; }
.sub-label { font-size: 13px; color: #6B7A8D; margin-bottom: 4px; }

/* 区切り */
.divider { border: none; border-top: 1px solid #D4DDE8; margin: 16px 0; }

/* ナビボタン */
.nav-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 20px; }
.btn { padding: 16px 28px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; border: 2px solid #1A5F7A; min-width: 130px; font-family: inherit; transition: opacity 0.1s; }
.btn:active { opacity: 0.75; }
.btn-primary { background: #1A5F7A; color: #fff; }
.btn-outline { background: #fff; color: #1A5F7A; }
.btn-disabled { background: #D4DDE8; color: #6B7A8D; border-color: #D4DDE8; cursor: not-allowed; }
.btn-full { width: 100%; }

/* インフォボックス */
.info-box { background: #E8F4F8; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #1A5F7A; margin-bottom: 14px; }
.warn-box { background: #FFF3CD; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #7A5500; margin-bottom: 14px; }

/* STOP-BANG行 */
.sb-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid #D4DDE8; }
.sb-row:last-child { border-bottom: none; }
.sb-key { width: 36px; height: 36px; border-radius: 50%; background: #1A5F7A; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
.sb-label { flex: 1; font-size: 15px; line-height: 1.4; }
.sb-btns { display: flex; gap: 8px; flex-shrink: 0; margin-top: 4px; }

/* 結果スコアカード */
.score-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.score-card { border-radius: 12px; padding: 16px 10px; text-align: center; border: 2px solid; background: #fff; }
.sc-title { font-size: 12px; color: #6B7A8D; font-weight: 700; margin-bottom: 4px; }
.sc-num { font-size: 36px; font-weight: 900; line-height: 1; }
.sc-max { font-size: 12px; color: #6B7A8D; margin-bottom: 6px; }
.sc-badge { border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; display: inline-block; }

/* バーグラフ */
.comp-row { display: flex; align-items: center; margin-bottom: 8px; }
.comp-label { width: 100px; font-size: 12px; color: #6B7A8D; flex-shrink: 0; }
.comp-bar-bg { flex: 1; height: 10px; background: #D4DDE8; border-radius: 5px; overflow: hidden; margin: 0 10px; }
.comp-bar { height: 100%; border-radius: 5px; transition: width 0.4s; }
.comp-score { width: 28px; font-size: 13px; font-weight: 700; text-align: right; }

/* アラート */
.alert-item { border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; font-size: 14px; font-weight: 600; }

/* モーダル */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; display: flex; flex-direction: column; }
.modal-header { background: #1A5F7A; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.modal-header span { color: #fff; font-weight: 700; font-size: 17px; }
.modal-close { background: rgba(255,255,255,0.2); border: none; color: #fff; border-radius: 10px; padding: 8px 20px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
.modal-iframe { flex: 1; border: none; background: #fff; }

/* BMIボタン */
.bmi-btn { padding: 13px 20px; background: #1A5F7A; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; width: 100%; margin-top: 8px; }

/* 効率表示 */
.eff-display { background: #E8F4F8; border-radius: 8px; padding: 8px 12px; font-size: 14px; color: #1A5F7A; margin-top: 8px; }

/* hidden */
.hidden { display: none !important; }
</style>
</head>

<!-- ヘッダー -->

<!-- コンテンツ -->
<div class="content" id="mainContent"></div>

  </div>

<script>
// ══════════════════════════════════════════
// データ定義
// ══════════════════════════════════════════
const FREQ4 = ["なし","週1回未満","週1〜2回","週3回以上"];
const QUAL4 = ["非常によい","かなりよい","かなり悪い","非常に悪い"];
const PROB4 = ["全く問題なし","わずかに問題","いくらか問題","非常に大きな問題"];
const ESS4  = ["眠らない","少し眠る","しばしば眠る","ほとんど眠る"];

const Q5_ITEMS = [
  ["q5a","30分以内に眠れなかった"],
  ["q5b","夜中や早朝に目が覚めた"],
  ["q5c","トイレに起きた"],
  ["q5d","息苦しかった"],
  ["q5e","咳・いびきが出た"],
  ["q5f","寒く感じた"],
  ["q5g","暑く感じた"],
  ["q5h","悪夢をみた"],
  ["q5i","痛みがあった"],
  ["q5j","その他の理由"],
];

const ESS_ITEMS = [
  "座って本・新聞などを読んでいるとき",
  "テレビを見ているとき",
  "会議・映画館など、公共の場所で座って何もしていないとき",
  "1時間以上、車に乗せてもらっているとき",
  "午後、横になって休憩しているとき",
  "座って人と話しているとき",
  "昼食後（お酒なし）、静かに座っているとき",
  "車の運転中、交通渋滞で数分間止まっているとき",
];

const SB_ITEMS = [
  ["S","大きないびきをかく（ドア越しに聞こえる、またはパートナーに指摘される）"],
  ["T","日中に疲れ・強い眠気・だるさを感じることが多い"],
  ["O","睡眠中に呼吸が止まっていると指摘されたことがある"],
  ["P","高血圧の治療中、または高血圧と言われたことがある"],
  ["B","BMIが28以上（スタッフが計算します）"],
  ["A","50歳以上"],
  ["N","首周囲径が40cm以上（スタッフが測定します）"],
  ["G","男性"],
];

// ══════════════════════════════════════════
// 状態
// ══════════════════════════════════════════
let state = {
  step: 0,        // 0=患者情報 1=PSQI(p1) 2=PSQI(p2) 3=ESS(p1) 4=ESS(p2) 5=STOP-BANG 6=結果
  name: "", date: new Date().toISOString().split("T")[0],
  height: "", weight: "", neck: "", bmi: "",
  psqi: {},
  ess: Array(8).fill(null),
  sb: Array(8).fill(null),
};

const STEPS = ["患者情報","PSQI①","PSQI②","ESS①","ESS②","STOP-BANG","結果"];
const STEP_GROUPS = [0,1,1,2,2,3,4]; // 表示グループ（患者情報/PSQI/ESS/STOP-BANG/結果）
const GROUP_LABELS = ["患者情報","PSQI","ESS","STOP-BANG","結果"];

// ══════════════════════════════════════════
// スコア計算
// ══════════════════════════════════════════
function calcPSQI() {
  const p = state.psqi;
  const n = v => (v===null||v===undefined) ? 0 : Number(v);
  const toMin = t => { if(!t) return null; const[h,m]=t.split(":").map(Number); return h*60+m; };

  const c1 = n(p.q6);

  const lat = Number(p.q2)||0;
  const latS = lat<16?0:lat<31?1:lat<61?2:3;
  const c2r = latS + n(p.q5a);
  const c2 = c2r===0?0:c2r<=2?1:c2r<=4?2:3;

  const dur = Number(p.q4)||0;
  const c3 = dur>7?0:dur>=6?1:dur>=5?2:3;

  let c4=0, eff=null;
  const bm=toMin(p.q1), wm=toMin(p.q3);
  if(bm!==null&&wm!==null&&p.q4){
    let inBed=wm-bm; if(inBed<=0)inBed+=1440;
    eff=inBed>0?(Number(p.q4)*60)/inBed*100:null;
    if(eff!==null) c4=eff>=85?0:eff>=75?1:eff>=65?2:3;
  }

  const dkeys=["q5b","q5c","q5d","q5e","q5f","q5g","q5h","q5i","q5j"];
  const c5r=dkeys.reduce((s,k)=>s+n(p[k]),0);
  const c5=c5r===0?0:c5r<=9?1:c5r<=18?2:3;

  const c6=n(p.q7);
  const c7r=n(p.q8)+n(p.q9);
  const c7=c7r===0?0:c7r<=2?1:c7r<=4?2:3;

  const comps={c1,c2,c3,c4,c5,c6,c7};
  const total=Object.values(comps).reduce((a,b)=>a+b,0);
  return {comps,total,eff};
}

function essTotal() { return state.ess.reduce((s,v)=>s+(v??0),0); }
function sbTotal() { return state.sb.filter(Boolean).length; }

function label(score, thresholds) {
  // thresholds: [[max, text, color, bg], ...]
  for(const [max,text,color,bg] of thresholds) {
    if(score <= max) return {text,color,bg};
  }
  return thresholds[thresholds.length-1].slice(1);
}
const PSQI_LABELS = [[5,"良好","#1A6B3C","#D4EDDA"],[10,"中等度","#7A5500","#FFF3CD"],[21,"重度","#8B1A1A","#FDDEDE"]];
const ESS_LABELS  = [[10,"正常","#1A6B3C","#D4EDDA"],[15,"中等度","#7A5500","#FFF3CD"],[24,"重度","#8B1A1A","#FDDEDE"]];
const SB_LABELS   = [[2,"低リスク","#1A6B3C","#D4EDDA"],[4,"中リスク","#7A5500","#FFF3CD"],[8,"高リスク","#8B1A1A","#FDDEDE"]];

// ══════════════════════════════════════════
// 完了チェック
// ══════════════════════════════════════════
function psqi1Done() {
  const p=state.psqi;
  return p.q1&&p.q2&&p.q3&&p.q4&&Q5_ITEMS.every(([k])=>p[k]!==undefined&&p[k]!==null);
}
function psqi2Done() {
  const p=state.psqi;
  return [p.q6,p.q7,p.q8,p.q9].every(v=>v!==undefined&&v!==null);
}
function ess1Done() { return state.ess.slice(0,4).every(v=>v!==null); }
function ess2Done() { return state.ess.slice(4,8).every(v=>v!==null); }
function sbDone()   { return state.sb.every(v=>v!==null); }

// ══════════════════════════════════════════
// UI部品生成
// ══════════════════════════════════════════
function radioGroup(options, selected, onSelect, cols) {
  const colClass = cols===4?"grid4":cols===2?"grid2":"grid2";
  return `<div class="${colClass}">
    ${options.map((opt,i)=>`
      <div class="touch-radio${selected===i?" selected":""}" onclick="(${onSelect})(${i})">
        ${opt}
      </div>`).join("")}
  </div>`;
}

function yesNo(val, onYes, onNo) {
  return `<div style="display:flex;gap:10px;margin-top:8px">
    <div class="touch-radio${val===true?" yes-sel":""}" style="flex:1;font-size:16px" onclick="(${onYes})()">はい</div>
    <div class="touch-radio${val===false?" no-sel":""}" style="flex:1;font-size:16px" onclick="(${onNo})()">いいえ</div>
  </div>`;
}

function navRow(leftLabel, leftAction, leftDisabled, rightLabel, rightAction, rightDisabled) {
  const left = leftLabel
    ? `<button class="btn btn-outline${leftDisabled?" btn-disabled":""}" onclick="${leftAction}" ${leftDisabled?"disabled":""}>${leftLabel}</button>`
    : `<div></div>`;
  const right = rightLabel
    ? `<button class="btn btn-primary${rightDisabled?" btn-disabled":""}" onclick="${rightAction}" ${rightDisabled?"disabled":""}>${rightLabel}</button>`
    : `<div></div>`;
  return `<div class="nav-row">${left}${right}</div>`;
}

// ══════════════════════════════════════════
// 各ステップのHTML生成
// ══════════════════════════════════════════
function renderStep0() {
  const {name,date,height,weight,neck,bmi} = state;
  const bmiNum = parseFloat(bmi);
  return `
    <div class="section-title" style="margin-bottom:4px">患者情報の確認</div>
    <div class="section-sub">スタッフが記入してください</div>
    <div class="card">
      <label class="field-label">患者氏名（任意）</label>
      <input type="text" value="${name}" placeholder="例：山田 太郎" oninput="state.name=this.value" style="margin-bottom:16px">

      <div class="grid3" style="margin-bottom:12px">
        <div>
          <label class="field-label">身長（cm）</label>
          <input type="number" value="${height}" placeholder="例：165" oninput="state.height=this.value">
        </div>
        <div>
          <label class="field-label">体重（kg）</label>
          <input type="number" value="${weight}" placeholder="例：70" oninput="state.weight=this.value">
        </div>
        <div>
          <label class="field-label">首周囲径（cm）</label>
          <input type="number" value="${neck}" placeholder="例：38" oninput="state.neck=this.value;state.sb[6]=parseFloat(this.value)>=40;rerender()">
        </div>
      </div>

      <button class="bmi-btn" onclick="calcBmiAction()">BMIを計算する</button>

      ${bmi ? `<div class="eff-display" style="margin-top:10px">
        BMI <strong>${bmi}</strong>　→　${bmiNum>=28?"28以上（STOP-BANG B項目：Yes）":"28未満（STOP-BANG B項目：No）"}<br>
        ${neck?`首周囲径 ${neck}cm　→　${parseFloat(neck)>=40?"40cm以上（N項目：Yes）":"40cm未満（N項目：No）"}`:""}
      </div>` : ""}

      <div style="margin-top:16px">
        <label class="field-label">受診日</label>
        <input type="date" value="${date}" oninput="state.date=this.value">
      </div>
    </div>
    ${navRow("","",true,"PSQI へ進む →","goTo(1)",false)}
  `;
}

function renderStep1() {
  const p = state.psqi;
  const showEff = p.q1&&p.q3&&p.q4;
  let effHtml = "";
  if(showEff){
    const r = calcPSQI();
    if(r.eff!==null) effHtml=`<div class="eff-display">睡眠効率（自動計算）：${r.eff.toFixed(0)}%</div>`;
  }
  return `
    <div class="section-title">① PSQI　ピッツバーグ睡眠質問票</div>
    <div class="section-sub">過去1か月間の、ふだんの睡眠についてお答えください</div>
    <div class="page-dots"><div class="page-dot active"></div><div class="page-dot"></div></div>

    <div class="card">
      <div style="font-weight:700;font-size:15px;color:#1A5F7A;margin-bottom:14px">睡眠時間について</div>
      <div class="grid2" style="margin-bottom:12px">
        <div>
          <label class="field-label">就床時刻</label>
          <input type="time" value="${p.q1||""}" onchange="state.psqi.q1=this.value;rerender()">
        </div>
        <div>
          <label class="field-label">起床時刻</label>
          <input type="time" value="${p.q3||""}" onchange="state.psqi.q3=this.value;rerender()">
        </div>
        <div>
          <label class="field-label">寝つくまでの時間（分）</label>
          <input type="number" value="${p.q2||""}" placeholder="例：30" oninput="state.psqi.q2=this.value">
        </div>
        <div>
          <label class="field-label">実際の睡眠時間（時間）</label>
          <input type="number" value="${p.q4||""}" placeholder="例：5.5" step="0.5" oninput="state.psqi.q4=this.value">
        </div>
      </div>
      ${effHtml}
    </div>

    <div class="card">
      <div style="font-weight:700;font-size:15px;color:#1A5F7A;margin-bottom:4px">問5：以下の理由で眠れなかった頻度は？</div>

  const alerts = [
    r.total>=11 && ["red","🔴 PSQI 重度（11点以上）：優先報告が必要です"],
    r.total>=6&&r.total<=10 && ["yellow","🟡 PSQI 中等度（6〜10点）：治療介入を検討してください"],

    et>=16 && ["red","🔴 ESS 重度（16点以上）：日中機能に重大な影響あり"],

    state.ess[7]>=2 && ["red","🔴 ESS問8（運転中）が2点以上：運転の安全性を確認してください"],

    r.total<=5&&et<=10&&st<=2 && ["green","🟢 全スコア正常範囲。通常フォローアップを継続してください。"],

  return `

      ${compNames.map((n,i)=>{
        const s=compVals[i];

}

function goTo(step) { state.step=step; rerender(); window.scrollTo(0,0); }

function calcBmiAction() {
  const h=parseFloat(state.height)/100, w=parseFloat(state.weight);
  if(h>0&&w>0){
    const b=(w/(h*h)).toFixed(1);
    state.bmi=b;
    state.sb[4]=parseFloat(b)>=28;
    rerender();
  }
}

function resetAll() {
  state={...state,step:0,name:"",psqi:{},ess:Array(8).fill(null),sb:Array(8).fill(null),bmi:"",height:"",weight:"",neck:""};
  rerender(); window.scrollTo(0,0);
}

// レンダリング
// ══════════════════════════════════════════
function rerender() {
  // 進捗ドット更新
  const grp = STEP_GROUPS[state.step];
  document.getElementById("progressDots").innerHTML = GROUP_LABELS.map((lbl,i)=>`
    <div class="dot-wrap" onclick="${i<grp?"goTo("+([0,1,3,5,6][i])+")":''}">
      <div class="dot" style="background:${i<grp?"#2ecc71":i===grp?"#fff":"rgba(255,255,255,0.3)"}; ${i===grp?"border:3px solid rgba(255,255,255,0.5)":""}"></div>
      <span class="dot-label${i===grp?" active":""}">${lbl}</span>
    </div>`).join("");

  // コンテンツ更新
  const renders = [renderStep0,renderStep1,renderStep2,renderStep3,renderStep4,renderStep5,renderStep6];
  document.getElementById("mainContent").innerHTML = renders[state.step]();
}

// 初期描画
rerender();

    regs.forEach(reg => reg.unregister());
